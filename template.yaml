AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Employee Management System - Lambda, DynamoDB, S3, CloudFront

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        EMPLOYEES_TABLE: !Ref EmployeesTable
        NODE_OPTIONS: '--enable-source-maps'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        External:
          - '@aws-sdk/*'

Resources:
  EmployeesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-employees'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true

  EmployeeApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 86400

  ListEmployeesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/listEmployees.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EmployeesTable
      Events:
        ListEmployees:
          Type: HttpApi
          Properties:
            ApiId: !Ref EmployeeApi
            Path: /employees
            Method: GET

  GetEmployeeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/getEmployee.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EmployeesTable
      Events:
        GetEmployee:
          Type: HttpApi
          Properties:
            ApiId: !Ref EmployeeApi
            Path: /employees/{id}
            Method: GET

  CreateEmployeeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/createEmployee.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmployeesTable
      Events:
        CreateEmployee:
          Type: HttpApi
          Properties:
            ApiId: !Ref EmployeeApi
            Path: /employees
            Method: POST

  UpdateEmployeeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/updateEmployee.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmployeesTable
      Events:
        UpdateEmployee:
          Type: HttpApi
          Properties:
            ApiId: !Ref EmployeeApi
            Path: /employees/{id}
            Method: PUT

  DeleteEmployeeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: src/handlers/deleteEmployee.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmployeesTable
      Events:
        DeleteEmployee:
          Type: HttpApi
          Properties:
            ApiId: !Ref EmployeeApi
            Path: /employees/{id}
            Method: DELETE

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub 'https://${EmployeeApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
  FrontendBucketName:
    Description: S3 bucket for frontend assets
    Value: !Ref FrontendBucket
  CloudFrontUrl:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${FrontendDistribution.DomainName}'
  CloudFrontDistributionId:
    Description: CloudFront distribution ID for cache invalidation
    Value: !Ref FrontendDistribution
  EmployeesTableName:
    Description: DynamoDB table name
    Value: !Ref EmployeesTable
